version: "3.9"

# Local Development Services
# Mirrors production: Neon -> Postgres 16 | Upstash -> Redis 7 | R2 -> MinIO
# Usage: docker compose up -d

services:
    postgres:
        image: postgres:16-alpine
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: piercerkzn
            POSTGRES_PASSWORD: piercerkzn_dev
            POSTGRES_DB: piercerkzn_dev
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U piercerkzn"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

    # S3-compatible stand-in for Cloudflare R2
    # Web console: http://localhost:9001  (minioadmin / minioadmin)
    minio:
        image: minio/minio:latest
        ports:
            - "9000:9000"
            - "9001:9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        command: server /data --console-address ":9001"
        volumes:
            - minio_data:/data
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
    minio_data:
